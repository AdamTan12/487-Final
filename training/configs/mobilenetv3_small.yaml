# MobileNetV3-small fine-tune on the 9-class HaGRID subset.
# Class order MUST match models/class_names.txt and models/preprocessing.txt.

model:
  name:          mobilenetv3_small
  num_classes:   9
  pretrained:    true

train:
  batch_size:    64
  epochs:        20
  lr:            1.0e-3
  optimizer:     adamw
  weight_decay:  1.0e-4
  scheduler:     cosine
  warmup_epochs: 1

# Preprocessing MUST mirror models/preprocessing.txt.
preprocessing:
  input_size: [224, 224]
  mean:       [0.485, 0.456, 0.406]
  std:        [0.229, 0.224, 0.225]
  scale:      0.00392156862745098   # 1/255

# No horizontal flip — some gestures (like, dislike, gun, ok) are
# direction-dependent and a mirror flip would change the semantic class.
augmentations:
  random_rotation_degrees: 15
  brightness_jitter:       0.2
  contrast_jitter:         0.2
  saturation_jitter:       0.1
  random_resized_crop:
    scale: [0.8, 1.0]
    ratio: [0.9, 1.1]
  horizontal_flip:         false

data:
  train_dir: ../data/hagrid_processed/train
  val_dir:   ../data/hagrid_processed/val
  test_dir:  ../data/hagrid_processed/test
  num_workers: 4

logging:
  out_dir:   runs/mobilenetv3_small
  log_every: 50
